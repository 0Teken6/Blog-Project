<div class="col-md-3">
    <div class="content-section sidebar">
        <h5>Filter Posts</h5>
        <form method="get">
            {% for field in filterset.form %}
                <div class="mb-3">
                    <strong>{{ field.label }}</strong>
                    <div>
                        {{ field }}
                    </div>
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-dark w-80">
                Apply Filters
            </button>
        </form>
    </div>
</div>
