{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
    {% load crispy_forms_tags %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'blog/main.css' %}">
</head>
<body>
    <header class="site-header">
        {% include "blog/custom/navbar.html" %}
    </header>

    <main role="main" class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}
    </main>
    <footer class="bg-light text-center text-muted mt-5 py-4 border-top">
        <div class="container">

            <!-- Links -->
            <div class="mb-2">
                <a href="/" class="text-decoration-none me-3">Home</a>
                <a href="{% url 'posts' %}" class="text-decoration-none me-3">Posts</a>
            </div>

            <!-- Copyright -->
            <div>
                <small>
                    © {{ now|date:"Y" }} MyBlog. All rights reserved.
                </small>
            </div>

        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
